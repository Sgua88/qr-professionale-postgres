<!doctype html>
<html lang="it">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Accedi - QR Manager</title>
  <link rel="manifest" href="/manifest.json">
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
  <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
  <meta name="theme-color" content="#071633">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="QR Manager">
  <style>
    *{box-sizing:border-box}
    body{
      margin:0;
      min-height:100vh;
      font-family:Inter,system-ui,Segoe UI,Arial,sans-serif;
      background:
        radial-gradient(circle at 20% 10%,rgba(79,99,255,.28),transparent 30%),
        radial-gradient(circle at 85% 80%,rgba(245,158,11,.24),transparent 32%),
        linear-gradient(135deg,#071633,#061128 55%,#0f172a);
      color:#fff;
      display:grid;
      place-items:center;
      padding:22px;
    }
    .login-card{
      width:min(440px,100%);
      background:rgba(255,255,255,.96);
      color:#111827;
      border-radius:28px;
      padding:30px;
      box-shadow:0 32px 90px rgba(0,0,0,.35);
      border:1px solid rgba(255,255,255,.22);
    }
    .brand{
      display:flex;
      align-items:center;
      gap:14px;
      margin-bottom:22px;
    }
    .brand img{
      width:62px;
      height:62px;
      object-fit:contain;
      border-radius:18px;
      box-shadow:0 12px 28px rgba(15,23,42,.16);
    }
    .brand h1{
      margin:0;
      font-size:25px;
      letter-spacing:.02em;
      color:#071633;
      line-height:1;
    }
    .brand p{
      margin:6px 0 0;
      color:#667085;
      font-size:13px;
      font-weight:700;
    }
    .field{margin:14px 0}
    label{
      display:block;
      font-size:12px;
      font-weight:900;
      color:#475467;
      margin:0 0 7px;
      text-transform:uppercase;
      letter-spacing:.04em;
    }
    input{
      width:100%;
      height:52px;
      border:1px solid #d7dde8;
      border-radius:16px;
      padding:0 15px;
      font-size:16px;
      outline:none;
      background:#fff;
      color:#111827;
    }
    input:focus{
      border-color:#4f63ff;
      box-shadow:0 0 0 4px rgba(79,99,255,.13);
    }
    .remember{
      display:flex;
      align-items:center;
      gap:10px;
      margin:16px 0 20px;
      color:#344054;
      font-size:14px;
      font-weight:700;
    }
    .remember input{
      width:20px;
      height:20px;
      accent-color:#4f63ff;
    }
    button{
      width:100%;
      height:52px;
      border:0;
      border-radius:16px;
      color:#fff;
      background:linear-gradient(135deg,#4f63ff,#2842d8);
      font-weight:900;
      font-size:16px;
      cursor:pointer;
      box-shadow:0 14px 30px rgba(79,99,255,.28);
    }
    button:active{transform:translateY(1px)}
    .error{
      display:none;
      margin:14px 0 0;
      padding:12px;
      border-radius:14px;
      background:#fef2f2;
      color:#b91c1c;
      font-weight:800;
      font-size:14px;
    }
    .hint{
      margin-top:18px;
      color:#667085;
      font-size:12px;
      line-height:1.45;
      text-align:center;
    }
  </style>
</head>
<body>
  <main class="login-card">
    <div class="brand">
      <img src="/assets/logo-qrmanager.png" alt="QR Manager">
      <div>
        <h1>QR MANAGER</h1>
        <p>Accesso riservato</p>
      </div>
    </div>

    <form id="loginForm">
      <div class="field">
        <label for="username">Utente</label>
        <input id="username" name="username" autocomplete="username" required>
      </div>
      <div class="field">
        <label for="password">Password</label>
        <input id="password" name="password" type="password" autocomplete="current-password" required>
      </div>
      <label class="remember">
        <input id="remember" type="checkbox" checked>
        Ricordami su questo dispositivo
      </label>
      <button id="loginBtn" type="submit">Accedi</button>
      <div id="errorBox" class="error"></div>
    </form>

    <div class="hint">
      Se usi la webapp da smartphone, con “Ricordami” resterai collegato anche riaprendola dalla schermata Home.
    </div>
  </main>

  <script>
    const form = document.getElementById('loginForm');
    const errorBox = document.getElementById('errorBox');
    const btn = document.getElementById('loginBtn');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      errorBox.style.display = 'none';
      btn.disabled = true;
      btn.textContent = 'Accesso...';

      try {
        const res = await fetch('/api/auth/login', {
          method: 'POST',
          headers: {'Content-Type':'application/json'},
          body: JSON.stringify({
            username: document.getElementById('username').value.trim(),
            password: document.getElementById('password').value,
            remember: document.getElementById('remember').checked
          })
        });

        const data = await res.json().catch(() => ({}));
        if (!res.ok || !data.success) {
          throw new Error(data.error || 'Credenziali non corrette');
        }

        location.href = '/';
      } catch (err) {
        errorBox.textContent = err.message || 'Errore di accesso';
        errorBox.style.display = 'block';
      } finally {
        btn.disabled = false;
        btn.textContent = 'Accedi';
      }
    });

    if ('serviceWorker' in navigator) {
      window.addEventListener('load', function(){
        navigator.serviceWorker.register('/service-worker.js').catch(function(){});
      });
    }
  </script>
</body>
</html>
